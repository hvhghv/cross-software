name: build busybox linux musl

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - '*-busybox'
    paths:
      - 'archive/busybox-1.38.0.tar.bz2'
      - 'scripts/build-busybox-musl.sh'
      - 'scripts/package-busybox-musl.sh'
  pull_request:
    paths:
      - 'archive/busybox-1.38.0.tar.bz2'
      - 'scripts/build-busybox-musl.sh'
      - 'scripts/package-busybox-musl.sh'

permissions:
  contents: read

env:
  SOFTWARE_NAME: busybox
  BUSYBOX_VERSION: '1.38.0'
  MUSL_RELEASE_BASE: https://github.com/hvhghv/musl-gcc/releases/download/musl-gcc

jobs:
  build-busybox-linux-musl:
    name: busybox / ${{ matrix.target }} / ${{ matrix.linkage }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-linux-musl
            toolchain_asset: musl-toolchain-x86_64.tar.gz
            qemu_runner: ''
            linkage: dynamic
          - arch: x86_64
            target: x86_64-linux-musl
            toolchain_asset: musl-toolchain-x86_64.tar.gz
            qemu_runner: ''
            linkage: static
          - arch: arm
            target: arm-linux-musleabi
            toolchain_asset: musl-toolchain-arm.tar.gz
            qemu_runner: qemu-arm-static
            linkage: dynamic
          - arch: arm
            target: arm-linux-musleabi
            toolchain_asset: musl-toolchain-arm.tar.gz
            qemu_runner: qemu-arm-static
            linkage: static
          - arch: aarch64
            target: aarch64-linux-musl
            toolchain_asset: musl-toolchain-aarch64.tar.gz
            qemu_runner: qemu-aarch64-static
            linkage: dynamic
          - arch: aarch64
            target: aarch64-linux-musl
            toolchain_asset: musl-toolchain-aarch64.tar.gz
            qemu_runner: qemu-aarch64-static
            linkage: static
          - arch: riscv64
            target: riscv64-linux-musl
            toolchain_asset: musl-toolchain-riscv64.tar.gz
            qemu_runner: qemu-riscv64-static
            linkage: dynamic
          - arch: riscv64
            target: riscv64-linux-musl
            toolchain_asset: musl-toolchain-riscv64.tar.gz
            qemu_runner: qemu-riscv64-static
            linkage: static

    steps:
      - name: Normalize matrix linkage
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          linkage='${{ matrix.linkage }}'
          if [ -z "$linkage" ]; then
            linkage=dynamic
          fi
          echo "linkage=$linkage" >> "$GITHUB_OUTPUT"

      - name: Validate BusyBox release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          case "$tag" in
            *-busybox) ;;
            *)
              echo "This workflow only releases busybox tags, got: $tag" >&2
              exit 1
              ;;
          esac
          version="${tag%-busybox}"
          version="${version#v}"
          if [ "$version" != "$BUSYBOX_VERSION" ]; then
            echo "Tag version $version does not match BUSYBOX_VERSION=$BUSYBOX_VERSION" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore musl toolchain cache
        uses: actions/cache@v4
        with:
          path: .cache/musl-toolchains/${{ matrix.target }}
          key: musl-toolchain-${{ runner.os }}-${{ matrix.target }}-${{ matrix.toolchain_asset }}

      - name: Install host dependencies
        shell: bash
        run: |
          set -euo pipefail
          target='${{ matrix.target }}'
          riscv_linux_headers=()
          if [ "$target" = riscv64-linux-musl ]; then
            riscv_linux_headers+=(linux-libc-dev-riscv64-cross)
          fi

          sudo apt-get update
          sudo apt-get install -y \
            bc \
            binutils \
            bison \
            build-essential \
            bzip2 \
            ca-certificates \
            ccache \
            curl \
            file \
            flex \
            perl \
            qemu-user-static \
            "${riscv_linux_headers[@]}"

      - name: Verify offline source archives
        shell: bash
        run: sha256sum --ignore-missing -c archive/SHA256SUMS

      - name: Install musl cross toolchain
        shell: bash
        run: |
          set -euo pipefail
          target='${{ matrix.target }}'
          asset='${{ matrix.toolchain_asset }}'
          toolchain_dir="$GITHUB_WORKSPACE/.cache/musl-toolchains/$target"
          archive="$RUNNER_TEMP/$asset"

          gcc_path=
          if [ -d "$toolchain_dir" ]; then
            gcc_path=$(find "$toolchain_dir" -type f -name "${target}-gcc" -print -quit)
          fi

          if [ -n "$gcc_path" ]; then
            echo "using cached musl toolchain from $toolchain_dir"
          else
            rm -rf "$toolchain_dir"
            mkdir -p "$toolchain_dir"
            curl -L --fail --retry 5 --retry-all-errors --connect-timeout 30 \
              -o "$archive" "$MUSL_RELEASE_BASE/$asset"
            test -s "$archive"
            tar -xzf "$archive" -C "$toolchain_dir"
          fi

          gcc_path=$(find "$toolchain_dir" -type f -name "${target}-gcc" -print -quit)
          if [ -z "$gcc_path" ]; then
            echo "${target}-gcc not found in $asset" >&2
            find "$toolchain_dir" -maxdepth 4 -type f -name '*-gcc' >&2
            exit 1
          fi

          bin_dir=$(dirname "$gcc_path")
          root_dir=$(dirname "$bin_dir")
          sysroot=$("$gcc_path" -print-sysroot)
          if [ -z "$sysroot" ] || [ ! -d "$sysroot" ]; then
            sysroot="$root_dir/$target"
          fi
          if [ ! -d "$sysroot" ]; then
            echo "musl sysroot not found for $target" >&2
            find "$root_dir" -maxdepth 2 -type d >&2
            exit 1
          fi

          if [ "$target" = riscv64-linux-musl ]; then
            linux_uapi=/usr/riscv64-linux-gnu/include
            if [ ! -d "$linux_uapi/linux" ]; then
              echo "riscv64 Linux UAPI headers not found under $linux_uapi" >&2
              find /usr -maxdepth 4 -type d -path '*/riscv64-linux-gnu/include' -print >&2 || true
              exit 1
            fi

            mkdir -p "$sysroot/include"
            for dir in asm asm-generic linux mtd rdma scsi sound video; do
              if [ -d "$linux_uapi/$dir" ]; then
                rm -rf "$sysroot/include/$dir"
                cp -a "$linux_uapi/$dir" "$sysroot/include/"
              fi
            done

            for header in \
              linux/capability.h \
              linux/fs.h \
              linux/kd.h \
              linux/netlink.h \
              linux/version.h \
              linux/vt.h
            do
              test -f "$sysroot/include/$header"
            done
          fi

          echo "$bin_dir" >> "$GITHUB_PATH"
          {
            echo "MUSL_CC=$gcc_path"
            echo "MUSL_AR=$bin_dir/$target-ar"
            echo "MUSL_RANLIB=$bin_dir/$target-ranlib"
            echo "MUSL_STRIP=$bin_dir/$target-strip"
            echo "MUSL_SYSROOT=$sysroot"
          } >> "$GITHUB_ENV"

          "$gcc_path" --version
          echo "sysroot=$sysroot"

      - name: Restore BusyBox ccache
        uses: actions/cache@v4
        with:
          path: .cache/ccache/busybox/${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}
          key: busybox-ccache-v1-${{ runner.os }}-${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}-${{ matrix.toolchain_asset }}-${{ hashFiles('archive/busybox-1.38.0.tar.bz2', 'scripts/build-busybox-musl.sh') }}
          restore-keys: |
            busybox-ccache-v1-${{ runner.os }}-${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}-${{ matrix.toolchain_asset }}-
            busybox-ccache-v1-${{ runner.os }}-${{ matrix.target }}-

      - name: Reset ccache stats
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.cache/ccache/busybox/${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}
        run: ccache --zero-stats || true

      - name: Build BusyBox
        id: build
        shell: bash
        env:
          TARGET_TRIPLET: ${{ matrix.target }}
          TARGET_ARCH: ${{ matrix.arch }}
          LINKAGE: ${{ steps.matrix.outputs.linkage }}
          JOBS: 2
          USE_CCACHE: 1
          CCACHE_DIR: ${{ github.workspace }}/.cache/ccache/busybox/${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
        run: bash scripts/build-busybox-musl.sh

      - name: Show ccache stats
        if: always()
        shell: bash
        env:
          CCACHE_DIR: ${{ github.workspace }}/.cache/ccache/busybox/${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}
        run: ccache --show-stats || true

      - name: Verify binary linkage and rootfs shape
        shell: bash
        env:
          LINKAGE: ${{ steps.matrix.outputs.linkage }}
          BUSYBOX_BIN: ${{ steps.build.outputs.busybox_bin }}
          ROOTFS_DIR: ${{ steps.build.outputs.rootfs_dir }}
        run: |
          set -euo pipefail
          file "$BUSYBOX_BIN" | tee busybox.file
          if [ "$LINKAGE" = static ]; then
            grep -Eqi 'statically linked|static-pie linked' busybox.file
          else
            grep -qi 'dynamically linked' busybox.file
            test -d "$ROOTFS_DIR/lib"
            test -x "$ROOTFS_DIR/usr/bin/busybox"
            test -e "$ROOTFS_DIR/usr/sbin/busybox"
            find "$ROOTFS_DIR/lib" -maxdepth 1 \( -name 'libc.so' -o -name 'ld-musl-*.so.1' \) -print -quit | grep -q .
            find "$ROOTFS_DIR/usr/bin" "$ROOTFS_DIR/usr/sbin" -type l -print -quit | grep -q .
          fi

      - name: Run smoke tests
        shell: bash
        env:
          LINKAGE: ${{ steps.matrix.outputs.linkage }}
          QEMU_RUNNER: ${{ matrix.qemu_runner }}
          BUSYBOX_BIN: ${{ steps.build.outputs.busybox_bin }}
          ROOTFS_DIR: ${{ steps.build.outputs.rootfs_dir }}
        run: |
          set -euo pipefail

          read_interpreter() {
            LC_ALL=C readelf -l "$1" \
              | sed -n 's|.*program interpreter: \([^]]*\)\].*|\1|p' \
              | head -n 1
          }

          run_target() {
            local binary=$1
            shift

            if [ -n "${QEMU_RUNNER:-}" ]; then
              if [ "$LINKAGE" = dynamic ]; then
                "$QEMU_RUNNER" -L "$ROOTFS_DIR" "$binary" "$@"
                return
              fi
              "$QEMU_RUNNER" "$binary" "$@"
              return
            fi

            if [ "$LINKAGE" = dynamic ]; then
              interp=$(read_interpreter "$binary" || true)
              if [ -n "$interp" ]; then
                "$ROOTFS_DIR$interp" \
                  --library-path "$ROOTFS_DIR/lib:$ROOTFS_DIR/usr/lib" \
                  "$binary" "$@"
                return
              fi
            fi

            "$binary" "$@"
          }

          run_target "$BUSYBOX_BIN" --help
          run_target "$BUSYBOX_BIN" true
          run_target "$BUSYBOX_BIN" sh -c 'echo BUSYBOX_SMOKE_OK'

      - name: Package BusyBox
        id: package
        shell: bash
        env:
          TARGET_TRIPLET: ${{ matrix.target }}
          LINKAGE: ${{ steps.matrix.outputs.linkage }}
          BUSYBOX_BIN: ${{ steps.build.outputs.busybox_bin }}
          ROOTFS_DIR: ${{ steps.build.outputs.rootfs_dir }}
          CONFIG_FILE: ${{ steps.build.outputs.config_file }}
        run: bash scripts/package-busybox-musl.sh

      - name: Upload BusyBox artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-${{ env.BUSYBOX_VERSION }}-${{ matrix.target }}-${{ steps.matrix.outputs.linkage }}
          path: |
            ${{ steps.package.outputs.package_file }}
            ${{ steps.package.outputs.checksum_file }}
          if-no-files-found: error

  release-busybox:
    name: release / busybox
    runs-on: ubuntu-22.04
    needs:
      - build-busybox-linux-musl
    if: startsWith(github.ref, 'refs/tags/') && endsWith(github.ref_name, '-busybox')
    permissions:
      contents: write

    steps:
      - name: Download BusyBox artifacts from this run
        uses: actions/download-artifact@v4
        with:
          pattern: busybox-${{ env.BUSYBOX_VERSION }}-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          rm -f SHA256SUMS
          rm -f *.sha256
          find . -maxdepth 1 -type f -printf '%f\n' \
            | sort \
            | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Publish BusyBox release assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            release-artifacts/busybox-*
            release-artifacts/SHA256SUMS
          fail_on_unmatched_files: true
